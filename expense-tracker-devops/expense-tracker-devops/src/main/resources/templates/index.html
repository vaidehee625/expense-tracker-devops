<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background:#eef2f7;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:30px auto;
        }

        .title{
            text-align:center;
            color:#1e3c72;
            margin-bottom:30px;
        }

        .dashboard-cards{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            margin-bottom:20px;
        }

        .dashboard-card{
            flex:1;
            min-width:250px;
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .dashboard-card h3{
            color:#1e3c72;
            margin-bottom:10px;
        }

        .dashboard-card p{
            font-size:28px;
            color:green;
            font-weight:bold;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:8px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }

        button{
            background:#1e3c72;
            color:white;
            padding:12px 20px;
            border:none;
            border-radius:8px;
            margin-top:15px;
            cursor:pointer;
        }

        button:hover{
            background:#16325c;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th, td{
            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#1e3c72;
            color:white;
        }

        .delete-btn{
            background:red;
        }

        .delete-btn:hover{
            background:darkred;
        }

    </style>

</head>

<body>

<div class="container">

    <h1 class="title">Smart Expense Tracker Dashboard</h1>

    <div class="dashboard-cards">

        <div class="dashboard-card">
            <h3>Total Expenses</h3>
            <p>₹ <span id="totalAmount">0</span></p>
        </div>

        <div class="dashboard-card">
            <h3>Total Categories</h3>
            <p id="totalCategories">0</p>
        </div>

        <div class="dashboard-card">
            <h3>Total Transactions</h3>
            <p id="recentExpenses">0</p>
        </div>

    </div>

    <div class="card">

        <h2>Add Expense</h2>

        <input type="text" id="title" placeholder="Expense Title">

        <input type="number" id="amount" placeholder="Amount">

        <input type="text" id="category" placeholder="Category">

        <input type="date" id="date">

        <button onclick="addExpense()">Add Expense</button>

    </div>

    <div class="card">

        <h2>Expense Analytics</h2>

        <canvas id="expenseChart"></canvas>

    </div>

    <div class="card">

        <h2>Expense List</h2>

        <table>

            <thead>

            <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody id="expenseTable">

            </tbody>

        </table>

    </div>

</div>

<script>

    const API_URL = "/api/expenses";

    let chart;

    async function fetchExpenses(){

        const response = await fetch(API_URL);

        const expenses = await response.json();

        const table = document.getElementById("expenseTable");

        table.innerHTML = "";

        let total = 0;

        let categories = {};

        expenses.forEach(expense => {

            total += expense.amount;

            categories[expense.category] =
                (categories[expense.category] || 0) + expense.amount;

            table.innerHTML += `
                <tr>
                    <td>${expense.title}</td>
                    <td>₹ ${expense.amount}</td>
                    <td>${expense.category}</td>
                    <td>${expense.date}</td>
                    <td>
                        <button class="delete-btn"
                        onclick="deleteExpense('${expense.id}')">
                            Delete
                        </button>
                    </td>
                </tr>
            `;

        });

        document.getElementById("totalAmount").innerText = total;

        document.getElementById("totalCategories").innerText =
            Object.keys(categories).length;

        document.getElementById("recentExpenses").innerText =
            expenses.length;

        updateChart(categories);

    }

    function updateChart(categories){

        const ctx = document.getElementById("expenseChart");

        if(chart){
            chart.destroy();
        }

        chart = new Chart(ctx, {

            type: 'pie',

            data: {

                labels: Object.keys(categories),

                datasets: [{
                    label: 'Expenses',
                    data: Object.values(categories)
                }]
            }

        });

    }

    async function addExpense(){

        const expense = {

            title: document.getElementById("title").value,
            amount: parseFloat(document.getElementById("amount").value),
            category: document.getElementById("category").value,
            date: document.getElementById("date").value

        };

        await fetch(API_URL, {

            method: "POST",

            headers: {
                "Content-Type":"application/json"
            },

            body: JSON.stringify(expense)

        });

        fetchExpenses();

        document.getElementById("title").value = "";
        document.getElementById("amount").value = "";
        document.getElementById("category").value = "";
        document.getElementById("date").value = "";

    }

    async function deleteExpense(id){

        await fetch(`${API_URL}/${id}`, {
            method:"DELETE"
        });

        fetchExpenses();

    }

    fetchExpenses();

</script>

</body>

</html>
